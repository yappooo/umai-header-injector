<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        background: #0b0b0b;
        color: #00ff41;
        font-family: Consolas, monospace;
        padding: 12px;
      }
      h1 {
        font-size: 12px;
        margin: 0 0 10px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #111;
        color: #00ff41;
        border: 1px solid #00ff41;
        padding: 6px;
        font-family: Consolas, monospace;
        font-size: 12px;
      }
      button {
        margin-top: 8px;
        width: 100%;
        background: #1b5e20;
        color: #fff;
        border: none;
        padding: 8px;
        font-weight: bold;
        cursor: pointer;
      }
      #status {
        margin-top: 8px;
        font-size: 11px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h1>UMAI venue-api-key</h1>
    <input id="apiKey" type="text" placeholder="venue-api-key" />
    <button id="save">SAVE & ACTIVATE</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
