<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        background: #0b0b0b;
        color: #00ff41;
        font-family: Consolas, monospace;
        padding: 12px;
      }
      h1 {
        font-size: 12px;
        margin: 0 0 10px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #111;
        color: #00ff41;
        border: 1px solid #00ff41;
        padding: 6px;
        font-family: Consolas, monospace;
        font-size: 12px;
      }
      button {
        margin-top: 8px;
        width: 100%;
        background: #1b5e20;
        color: #fff;
        border: none;
        padding: 8px;
        font-weight: bold;
        cursor: pointer;
      }
      button.secondary {
        background: #004d40;
      }
      button.danger {
        background: #b71c1c;
      }
      a.optlink {
        display: block;
        margin-top: 10px;
        font-size: 11px;
        color: #00bcd4;
        text-align: center;
        cursor: pointer;
      }
      button:disabled {
        background: #333;
        color: #777;
        cursor: default;
      }
      #status,
      #harvestStatus {
        margin-top: 8px;
        font-size: 11px;
        min-height: 14px;
      }
      hr {
        border-color: #1a1a1a;
        margin: 12px 0;
      }
      #huntLog {
        margin-top: 6px;
        height: 110px;
        overflow-y: auto;
        background: #000;
        border: 1px solid #1a1a1a;
        font-size: 10px;
        padding: 4px;
        white-space: pre-wrap;
      }
      #huntLog div {
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <h1>UMAI venue-api-key</h1>
    <input id="apiKey" type="text" placeholder="venue-api-key" />
    <button id="save">SAVE & ACTIVATE</button>
    <div id="status"></div>
    <hr />
    <button id="harvest" class="secondary">HARVEST LATEST KEY (rembayung)</button>
    <div id="harvestStatus"></div>
    <button id="useHarvested" style="display:none">USE THIS KEY</button>
    <hr />
    <a id="openOptions" class="optlink">Configure hunt...</a>
    <button id="startHunt">START HUNT</button>
    <button id="stopHunt" class="danger" style="display:none">STOP HUNT</button>
    <div id="huntStatus"></div>
    <div id="huntLog"></div>
    <hr />
    <button id="getOtp" class="secondary">GET OTP NOW</button>
    <div id="otpStatus"></div>
    <script src="popup.js"></script>
  </body>
</html>
